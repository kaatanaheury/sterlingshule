{% extends "base.html" %}
{% block title %}Delete Assessment · SterlingShule{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto ss-card p-6 space-y-4">
  <h1 class="text-xl font-semibold text-red-600">Delete this assessment?</h1>
  <p class="text-sm text-slate-600 dark:text-slate-300">
    All rubric levels and recorded marks for <strong>{{ assessment.name }}</strong> will be permanently removed.
  </p>
  <form method="post" class="flex items-center justify-end gap-2">
    {% csrf_token %}
    <a href="{% url 'assessments:list' %}" class="px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 text-sm">Cancel</a>
    <button type="submit" class="px-4 py-2 rounded-lg bg-red-600 hover:bg-red-700 text-white text-sm">Delete</button>
  </form>
</div>
{% endblock %}
