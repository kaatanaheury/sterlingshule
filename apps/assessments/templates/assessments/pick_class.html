{% extends "base.html" %}
{% block title %}Pick Class · {{ assessment.name }} · SterlingShule{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
  {% include "_page_header.html" with title="Enter marks" subtitle=assessment.name %}

  <div class="ss-card p-6">
    <form method="get" action="{% url 'assessments:marks_entry' assessment.pk %}" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1">Class</label>
        <select name="class_level" required class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-3 py-2 text-sm">
          <option value="">Select class…</option>
          {% for c in targets %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Stream (optional)</label>
        <select name="stream" class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-3 py-2 text-sm">
          <option value="">— Whole class —</option>
          {% for s in streams %}<option value="{{ s.id }}">{{ s.class_level.name }} {{ s.name }}</option>{% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Subject</label>
        <select name="subject" required class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-3 py-2 text-sm">
          <option value="">Select subject…</option>
          {% for s in subjects %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="flex items-center justify-end gap-2 pt-2">
        <a href="{% url 'assessments:list' %}" class="px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 text-sm">Cancel</a>
        <button type="submit" class="px-4 py-2 rounded-lg bg-tropical hover:bg-tropical-dark text-white text-sm">Continue</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
